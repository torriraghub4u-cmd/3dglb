<!DOCTYPE html>
<html>
<head>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

<model-viewer
id="mv"
src="model.glb"
camera-controls>
</model-viewer>

window.playClip = function(name){

    scene.animationGroups.forEach(anim=>{
        anim.stop();
    });

    const clip = scene.getAnimationGroupByName(name);

    if(clip){
        clip.reset();
        clip.play();
    }
}

model-viewer {
  width: 100%;
  height: 600px;
  display: block;
}
</style>
</head>
<body>

<model-viewer
  src="./model.glb"
  camera-controls
  auto-rotate>
</model-viewer>

</body>
</html>
